name: Auto sync upstream and release binary

on:
  push:
    branches:
      - main
  schedule:
    # Every day at 21:00 Asia/Shanghai (13:00 UTC). GitHub may delay scheduled runs.
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cpa-plus-auto-sync-release
  cancel-in-progress: false

jobs:
  sync-build-release:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    env:
      CPA_PLUS_SKIP_TESTS: "1"
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Detect upstream changes
        id: upstream
        run: |
          current_cli="$(cat CLI_UPSTREAM_BASE 2>/dev/null || true)"
          current_plus="$(cat PLUS_UPSTREAM_BASE 2>/dev/null || true)"
          latest_cli="$(git ls-remote https://github.com/router-for-me/CLIProxyAPI.git refs/heads/main | awk '{print $1}')"
          latest_plus="$(git ls-remote https://github.com/seakee/CPA-Manager-Plus.git refs/heads/main | awk '{print $1}')"

          if [[ -z "${latest_cli}" || -z "${latest_plus}" ]]; then
            echo "failed to query upstream commits" >&2
            exit 1
          fi

          cli_changed=false
          plus_changed=false
          if [[ "${current_cli}" != "${latest_cli}" ]]; then
            cli_changed=true
          fi
          if [[ "${current_plus}" != "${latest_plus}" ]]; then
            plus_changed=true
          fi

          should_sync=false
          if [[ "${cli_changed}" == "true" || "${plus_changed}" == "true" ]]; then
            should_sync=true
          fi

          should_release=false
          if [[ "${should_sync}" == "true" || "${GITHUB_EVENT_NAME}" == "push" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            should_release=true
          fi

          {
            echo "current_cli=${current_cli}"
            echo "latest_cli=${latest_cli}"
            echo "current_plus=${current_plus}"
            echo "latest_plus=${latest_plus}"
            echo "cli_changed=${cli_changed}"
            echo "plus_changed=${plus_changed}"
            echo "should_sync=${should_sync}"
            echo "should_release=${should_release}"
          } >> "${GITHUB_OUTPUT}"

          echo "CLIProxyAPI current=${current_cli} latest=${latest_cli} changed=${cli_changed}"
          echo "CPA-Manager-Plus current=${current_plus} latest=${latest_plus} changed=${plus_changed}"
          echo "should_sync=${should_sync}"
          echo "should_release=${should_release}"

      - name: Stop when no upstream changed and no release requested
        if: steps.upstream.outputs.should_release != 'true'
        run: |
          echo "No upstream change and no push/manual release request; sync/build/release skipped."

      - name: Setup Go
        if: steps.upstream.outputs.should_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Setup Node.js
        if: steps.upstream.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install system dependencies
        if: steps.upstream.outputs.should_release == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rsync build-essential pkg-config

      - name: Configure git author
        if: steps.upstream.outputs.should_sync == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream metadata and patch
        if: steps.upstream.outputs.should_sync == 'true'
        id: sync
        run: |
          ./scripts/ci-sync-upstream.sh

      - name: Commit refreshed patch and metadata
        if: steps.upstream.outputs.should_sync == 'true'
        run: |
          git add CLI_UPSTREAM_BASE PLUS_UPSTREAM_BASE patches/cliproxyapi/0001-cpa-plus-integration.patch
          if git diff --cached --quiet; then
            echo "No metadata or patch diff after upstream sync."
          else
            git commit -m "chore: sync upstream ${{ steps.sync.outputs.cli_version }} plus ${{ steps.sync.outputs.plus_version }}"
            git push origin HEAD:main
          fi

      - name: Build Linux amd64 binary
        if: steps.upstream.outputs.should_release == 'true'
        run: |
          ./scripts/build-linux-binary.sh --skip-tests
          sha256sum dist/CLIProxyAPI-linux-amd64 > dist/CLIProxyAPI-linux-amd64.sha256

      - name: Prepare release metadata
        if: steps.upstream.outputs.should_release == 'true'
        run: |
          updated_at="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
          if [[ -f .build/out/CLIProxyAPI/.cpa-plus-auto-build.env ]]; then
            # shellcheck disable=SC1091
            source .build/out/CLIProxyAPI/.cpa-plus-auto-build.env
          fi
          cat > release-notes.md <<NOTES
          CPA-PLUS latest binary release

          Updated at: ${updated_at}

          - CLIProxyAPI upstream version: ${CLI_UPSTREAM_VERSION:-unknown}
          - CLIProxyAPI upstream commit: ${CLI_UPSTREAM_COMMIT:-${{ steps.upstream.outputs.latest_cli }}}
          - CPA-Manager-Plus upstream version: ${PLUS_UPSTREAM_VERSION:-unknown}
          - CPA-Manager-Plus upstream commit: ${PLUS_UPSTREAM_COMMIT:-${{ steps.upstream.outputs.latest_plus }}}
          - Binary: CLIProxyAPI-linux-amd64
          - Build base: ubuntu-22.04

          Download and run on Linux amd64. The bundled Plus panel is served at /management.html.
          NOTES

      - name: Refresh fixed latest release
        if: steps.upstream.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest HEAD
          git push origin refs/tags/latest --force
          gh release delete latest --yes || true
          gh release create latest dist/CLIProxyAPI-linux-amd64 dist/CLIProxyAPI-linux-amd64.sha256 \
            --title "CPA-PLUS latest" \
            --notes-file release-notes.md \
            --latest

      - name: Delete old releases and tags
        if: steps.upstream.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --limit 1000 --json tagName --jq '.[].tagName' | while read -r tag; do
            if [[ -z "${tag}" || "${tag}" == "latest" ]]; then
              continue
            fi
            echo "Deleting old release: ${tag}"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

          git ls-remote --tags origin | awk '$2 !~ /\^\{\}$/ {sub("refs/tags/", "", $2); print $2}' | while read -r tag; do
            if [[ -z "${tag}" || "${tag}" == "latest" ]]; then
              continue
            fi
            echo "Deleting old tag: ${tag}"
            git push origin ":refs/tags/${tag}" || true
          done
