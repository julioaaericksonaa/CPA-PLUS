name: CPA-PLUS Auto Build

on:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: CLIProxyAPI ref/tag/branch
        required: false
        default: main
      plus_ref:
        description: CPA-Manager-Plus ref/tag/branch
        required: false
        default: main
  schedule:
    - cron: '20 3 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout auto branch
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare source
        env:
          CLI_UPSTREAM_REF: ${{ github.event.inputs.cli_ref || 'main' }}
          PLUS_UPSTREAM_REF: ${{ github.event.inputs.plus_ref || 'main' }}
          CPA_PLUS_SKIP_TESTS: '1'
        run: ./cpa-plus-core/prepare-source.sh

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .build/out/CLIProxyAPI
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cpa-plus:latest
            ghcr.io/${{ github.repository_owner }}/cpa-plus:auto-${{ github.run_number }}
