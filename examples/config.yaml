# CPA-PLUS example config (sanitized)
# Copy to your runtime app directory as config.yaml, then replace CHANGE_ME values.

host: "127.0.0.1"
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: false
  secret-key: "CHANGE_ME_MANAGEMENT_KEY"
  disable-control-panel: false
  disable-auto-update-panel: true
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

auth-dir: "~/.cli-proxy-api"

api-keys:
  - "CHANGE_ME_CLIENT_API_KEY"

plus-manager:
  enabled: true
  data-dir: ./data
  db-path: ./data/usage.sqlite
  collector-enabled: true
  collector-mode: auto
  poll-interval-ms: 1000

debug: false
commercial-mode: false
logging-to-file: false
logs-max-total-size-mb: 1024
error-logs-max-files: 10
usage-statistics-enabled: false
redis-usage-queue-retention-seconds: 60
proxy-url: ""
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30
disable-cooling: false
force-model-prefix: false
passthrough-headers: false
ws-auth: true
enable-gemini-cli-endpoint: false
nonstream-keepalive-interval: 0

routing:
  strategy: "round-robin"
  session-affinity: false
  session-affinity-ttl: "1h"

quota-exceeded:
  switch-project: true
  switch-preview-model: true
  antigravity-credits: true

pprof:
  enable: false
  addr: "127.0.0.1:8316"

plugins:
  enabled: false
  dir: "plugins"
  configs: {}

codex:
  identity-confuse: false

